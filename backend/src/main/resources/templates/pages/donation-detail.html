<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>捐赠物品详情 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('donations', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="detail-shell row g-4 align-items-start">
        <div class="col-lg-7">
            <div class="card panel-card border-0 shadow-sm overflow-hidden">
                <div class="card-body p-3 p-md-4">
                    <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}"
                         class="img-fluid detail-cover rounded-4"
                         alt="捐赠物品封面">
                </div>
            </div>

            <div class="card panel-card border-0 shadow-sm mt-4">
                <div class="card-body p-4 p-md-5">
                    <div class="section-head mb-3">
                        <div>
                            <h2 class="section-title mb-1">物品说明</h2>
                            <p class="section-subtitle mb-0">确认取件方式和物品情况后再提交认领申请。</p>
                        </div>
                    </div>
                    <div class="detail-description"
                         th:text="${item.description != null and item.description != '' ? item.description : '发布者暂未填写详细说明。'}"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card panel-card border-0 shadow-sm detail-summary-card">
                <div class="card-body p-4 p-md-5">
                    <div class="detail-badges d-flex flex-wrap gap-2 mb-3">
                        <span class="badge text-bg-light" th:text="${item.categoryName}"></span>
                        <span class="badge order-badge" th:text="${item.statusLabel}"></span>
                    </div>

                    <h1 class="detail-title mb-2" th:text="${item.title}"></h1>

                    <div class="info-list detail-info-list mb-4">
                        <p><strong>捐赠方</strong><span th:text="${item.donorName}"></span></p>
                        <p><strong>联系方式</strong><span th:text="${item.contactInfo}"></span></p>
                        <p><strong>取件地点</strong><span th:text="${item.pickupAddress != null and item.pickupAddress != '' ? item.pickupAddress : '待沟通'}"></span></p>
                    </div>

                    <div class="d-grid gap-2 mb-4" th:if="${loggedIn and session.LOGIN_USER_ID != item.donorId}">
                        <a class="btn btn-outline-primary"
                           th:href="@{'/chat?peerUserId=' + ${item.donorId}}">联系捐赠方</a>
                    </div>

                    <form method="post" th:action="@{'/donations/' + ${item.id} + '/claim'}" class="d-grid gap-3">
                        <div>
                            <label class="form-label">认领备注</label>
                            <textarea class="form-control" rows="4" maxlength="255" name="claimRemark"
                                      placeholder="例如：想自用，可以周三下午到图书馆门口领取"></textarea>
                        </div>
                        <button class="btn btn-primary"
                                type="submit"
                                th:disabled="${item.status != 'AVAILABLE'}"
                                th:text="${item.status == 'AVAILABLE' ? '提交认领申请' : '当前不可认领'}"></button>
                        <a class="btn btn-outline-secondary" th:href="@{/donations}">返回捐赠广场</a>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
