<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>发布租赁物品 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('rentals', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="row g-4 align-items-start form-shell">
        <div class="col-lg-8">
            <div class="card panel-card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <div>
                            <h2 class="section-title mb-1">发布租赁物品</h2>
                            <p class="section-subtitle mb-0">填写租金、押金和联系方式，方便同学快速了解租赁条件。</p>
                        </div>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/rentals/my}">我的租赁</a>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form method="post" enctype="multipart/form-data" th:action="@{/rentals/publish}">
                        <div class="mb-3">
                            <label class="form-label">物品标题</label>
                            <input class="form-control" name="title" required maxlength="128" placeholder="例如：佳能相机 80D">
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">物品分类</label>
                                <select class="form-select" name="categoryId" required>
                                    <option value="">请选择分类</option>
                                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">联系方式</label>
                                <input class="form-control" name="contactInfo" maxlength="64" placeholder="手机号 / 微信 / QQ" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">日租金</label>
                                <input class="form-control" name="dailyRent" type="number" step="0.01" min="0.01" required placeholder="例如 30.00">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">押金</label>
                                <input class="form-control" name="deposit" type="number" step="0.01" min="0" placeholder="例如 100.00">
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">物品说明</label>
                            <textarea class="form-control" rows="5" maxlength="2000" name="description" placeholder="建议说明新旧程度、配件情况、租借要求、交易地点等"></textarea>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">物品图片</label>
                            <input class="form-control" type="file" name="imageFile" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif">
                            <div class="form-hint">支持 jpg/jpeg/png/webp/gif，单张图片不超过 5MB。</div>
                        </div>

                        <button class="btn btn-primary mt-4" type="submit">发布租赁物品</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
