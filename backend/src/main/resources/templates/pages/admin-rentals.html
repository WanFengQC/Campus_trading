<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>зјӮдҪёоҳұйҚ жӣ зІҠй””еү§дёҚй–ҝж¶ҳе«ӯйҚҠ?- й—Ғе‘ҠиүҫжҘ жӯҢгҒҗйҺҫоҶјз®із‘ңе¶үеҙәеҰӨе‘ӯзҹ—?/title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('rentals', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">зјӮдҪёоҳұйҚ жӣ зІҠй””зӮ¬еӘјй–өеҝ•е§ҙз»Җе¬¬зҙ’йҗҷе‘ҜзЈҝй–№?/h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/rentals}">
                <div class="col-md-10">
                    <select class="form-select" name="status">
                        <option value="">й—ҒзЁҝз№ҲйҚ”жҲҰеҙ•йҺҫоҶҪеҒҗй–је“Ҙо•ҪйҚӢ?/option>
                        <option value="PENDING" th:selected="${status == 'PENDING'}">йҗҺеһ«жҫҳйҺіеәЁеҙөйЎ“зҠөзҹ“й–»ж–ҝжҶЎйҗ“ж¬‘з—ӘйЎ“СғжһҰжӨӨ?/option>
                        <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">зјӮдҪёоҳұйҚ жӣ зІҠй””иҠҘдәӨжҝһжҲһзІ йҸҖи—үвҳү?/option>
                        <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">йҗҺз‘°жҶЎиӨ°еҶ®жӮҫйЎ’еӢ«з®Ј?/option>
                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">йҗҺз‘°жҶЎиӨ°еҶӯгҒҗйҚҘСҖж§Ҳ?/option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">зјӮдҪ№зЁ’йҗ©оҲһеҹҖ?/button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>й–»зҠұйҷҚйҚЁз‘°з•·йҗ”з…Һзҹ—?/th>
                <th>зјӮдҪёоҳұйҚ жӣ зІҠй”•еӮӣеҒӢй–іиҪ°з„ҰйҺҜ?/th>
                <th>й—ҒйҖӣзө»еЁүжӣўпҪһйҠҲеӨҠжЈҳ?/th>
                <th>й—Ғе‘ҠеһјеЁ…пҪүпҪһйҠҲеӨҠжЈҳ?/th>
                <th>зјӮдҪёоҳұйҚ ж„¬п№ў?/th>
                <th>й—ӮдҪёеј¶йҚЁеқ—В·?/th>
                <th>й—Ғз»ҳоҹҲйҚ©ж ӯеҹҖ?/th>
                <th>й—Ғе‘Ҡеё—з»ӢжҲ зҙ“йҺҫиҜІзұҚй–ёоӮЈжҙҳй”ӣ?/th>
                <th class="text-end">й—Ғз‘°зҒқз»үеҙҮзҙһ?/th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${orders.isEmpty()}">
                <td colspan="9" class="text-center text-secondary py-4">й—Ғе“„жЈ—йҚҠз‘°ОӣйҠҲеӣ©зҹ“й–»ж—ҮеҙөйҠҲп№ӮжӮ№жөЈйқӣзҒ©зҖ№?/td>
            </tr>
            <tr th:each="item : ${orders}">
                <td th:text="${item.orderNo}"></td>
                <td>
                    <div class="fw-semibold" th:text="${item.rentalTitle}"></div>
                    <a class="small" th:href="@{'/rentals/' + ${item.rentalItemId}}">й—Ғе“„иў«йҚҺеҶІп№ўйҚӣоҲңзҹ“й–»ж—ҮеҙөйҠҲп№ӮжӮ№йҚҘзғҪжӘ®й–ё?/a>
                </td>
                <td th:text="${item.renterName}"></td>
                <td th:text="${item.ownerName}"></td>
                <td>
                    <div th:text="${item.startDate}"></div>
                    <div class="small text-secondary" th:text="${'й—Ғ?' + item.endDate}"></div>
                </td>
                <td class="price-text" th:text="${'жҝЎ? + item.totalAmount}"></td>
                <td><span class="badge order-badge" th:text="${item.statusLabel}"></span></td>
                <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <form class="d-inline" method="post" th:action="@{'/admin/rentals/' + ${item.orderId} + '/status'}">
                        <select class="form-select form-select-sm d-inline-block" style="width: 170px;" name="status">
                            <option value="PENDING" th:selected="${item.status == 'PENDING'}">йҗҺеһ«жҫҳйҺіеәЁеҙөйЎ“зҠөзҹ“й–»ж–ҝжҶЎйҗ“ж¬‘з—ӘйЎ“СғжһҰжӨӨ?/option>
                            <option value="ACTIVE" th:selected="${item.status == 'ACTIVE'}">зјӮдҪёоҳұйҚ жӣ зІҠй””иҠҘдәӨжҝһжҲһзІ йҸҖи—үвҳү?/option>
                            <option value="COMPLETED" th:selected="${item.status == 'COMPLETED'}">йҗҺз‘°жҶЎиӨ°еҶ®жӮҫйЎ’еӢ«з®Ј?/option>
                            <option value="CANCELLED" th:selected="${item.status == 'CANCELLED'}">йҗҺз‘°жҶЎиӨ°еҶӯгҒҗйҚҘСҖж§Ҳ?/option>
                        </select>
                        <button class="btn btn-sm btn-outline-primary" type="submit">й—Ғе“„жҙӨйҗЎг„©еј»?/button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
