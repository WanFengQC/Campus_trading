<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>分类管理 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('categories', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">分类管理</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <h6 class="mb-3">新增分类</h6>
            <form class="row g-2" method="post" th:action="@{/admin/categories/create}">
                <div class="col-md-6">
                    <input class="form-control" name="name" maxlength="64" placeholder="例如：数码电子" required>
                </div>
                <div class="col-md-4">
                    <input class="form-control" name="sortNo" type="number" placeholder="数字越小越靠前">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">新增</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>分类名称</th>
                <th>排序值</th>
                <th>状态</th>
                <th class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${categories.isEmpty()}">
                <td colspan="5" class="text-center text-secondary py-4">当前没有分类数据。</td>
            </tr>
            <tr th:each="item : ${categories}">
                <form method="post" th:action="@{'/admin/categories/' + ${item.categoryId} + '/update'}">
                    <td th:text="${item.categoryId}"></td>
                    <td><input class="form-control form-control-sm" name="name" maxlength="64" th:value="${item.name}" required></td>
                    <td><input class="form-control form-control-sm" name="sortNo" type="number" th:value="${item.sortNo}" required></td>
                    <td>
                        <select class="form-select form-select-sm" name="status">
                            <option value="1" th:selected="${item.status == 1}">启用</option>
                            <option value="0" th:selected="${item.status == 0}">停用</option>
                        </select>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary" type="submit">保存</button>
                    </td>
                </form>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
