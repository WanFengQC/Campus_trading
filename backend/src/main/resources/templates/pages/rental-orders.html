<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>租赁记录 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('rentals', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">租赁记录</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="empty-state" th:if="${orders.isEmpty()}">当前还没有你作为租客发起的租赁记录。</div>

    <div class="d-grid gap-3" th:if="${!orders.isEmpty()}">
        <div class="card panel-card border-0 shadow-sm" th:each="order : ${orders}">
            <div class="card-body">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3">
                    <div>
                        <div class="fw-semibold" th:text="${'订单号：' + order.orderNo}"></div>
                        <div class="small text-secondary">
                            <span>你是租客</span>
                            <span class="mx-2">|</span>
                            <span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </div>
                    <span class="badge order-badge" th:text="${order.statusLabel}"></span>
                </div>

                <div class="row g-3 align-items-center">
                    <div class="col-md-7">
                        <div class="d-flex align-items-center gap-3">
                            <img th:src="${order.rentalCoverImageUrl != null ? order.rentalCoverImageUrl : '/images/default-goods.svg'}"
                                 class="list-thumb"
                                 alt="租赁物品封面">
                            <div>
                                <div class="fw-semibold" th:text="${order.rentalTitle}"></div>
                                <div class="small text-secondary" th:text="${'租期：' + order.startDate + ' ~ ' + order.endDate}"></div>
                                <div class="small text-secondary" th:text="${'日租金：¥' + order.dailyRent + '，押金：¥' + order.deposit}"></div>
                                <div class="small text-secondary"
                                     th:if="${order.renterRemark != null and order.renterRemark != ''}"
                                     th:text="${'备注：' + order.renterRemark}"></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="d-flex justify-content-md-end align-items-center gap-2 flex-wrap">
                            <div class="price-text me-md-2" th:text="${'¥' + order.totalAmount}"></div>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{'/rentals/' + ${order.rentalItemId}}">查看物品</a>

                            <form th:if="${order.status == 'PENDING'}"
                                  method="post"
                                  th:action="@{'/rental-orders/' + ${order.orderId} + '/cancel'}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">取消订单</button>
                            </form>

                            <form th:if="${order.status == 'ACTIVE'}"
                                  method="post"
                                  th:action="@{'/rental-orders/' + ${order.orderId} + '/complete'}">
                                <button class="btn btn-sm btn-success" type="submit">确认归还</button>
                            </form>

                            <form class="d-inline-flex align-items-center gap-2"
                                  th:if="${order.status == 'ACTIVE'}"
                                  method="post"
                                  th:action="@{'/rental-orders/' + ${order.orderId} + '/renew'}">
                                <input class="form-control form-control-sm" type="date" name="newEndDate" required>
                                <button class="btn btn-sm btn-outline-primary" type="submit">续租</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
