<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单管理 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('orders', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">订单管理</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/orders}">
                <div class="col-md-10">
                    <select class="form-select" name="status">
                        <option value="">全部订单状态</option>
                        <option value="PENDING" th:selected="${status == 'PENDING'}">待卖家确认</option>
                        <option value="SELLER_CONFIRMED" th:selected="${status == 'SELLER_CONFIRMED'}">待买家确认收货</option>
                        <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">已完成</option>
                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">已取消</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">筛选</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>订单号</th>
                <th>商品与见面信息</th>
                <th>买家</th>
                <th>卖家</th>
                <th>金额</th>
                <th>状态</th>
                <th>创建时间</th>
                <th class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${orders.isEmpty()}">
                <td colspan="8" class="text-center text-secondary py-4">当前没有符合条件的订单。</td>
            </tr>
            <tr th:each="item : ${orders}">
                <td th:text="${item.orderNo}"></td>
                <td>
                    <div class="fw-semibold" th:text="${item.goodsTitle}"></div>
                    <a class="small" th:href="@{'/goods/' + ${item.goodsId}}">查看商品</a>
                    <div class="small text-secondary" th:if="${item.meetupTime != null}">
                        见面时间：<span th:text="${#temporals.format(item.meetupTime, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                    <div class="small text-secondary" th:if="${item.meetupLocation != null and item.meetupLocation != ''}">
                        见面地点：<span th:text="${item.meetupLocation}"></span>
                    </div>
                    <div class="small text-secondary" th:if="${item.meetupNote != null and item.meetupNote != ''}">
                        备注：<span th:text="${item.meetupNote}"></span>
                    </div>
                </td>
                <td th:text="${item.buyerName}"></td>
                <td th:text="${item.sellerName}"></td>
                <td class="price-text" th:text="${'¥' + item.amount}"></td>
                <td><span class="badge order-badge" th:text="${item.statusLabel}"></span></td>
                <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <form class="d-inline" method="post" th:action="@{'/admin/orders/' + ${item.orderId} + '/status'}">
                        <select class="form-select form-select-sm d-inline-block" style="width: 170px;" name="status">
                            <option value="PENDING" th:selected="${item.status == 'PENDING'}">待卖家确认</option>
                            <option value="SELLER_CONFIRMED" th:selected="${item.status == 'SELLER_CONFIRMED'}">待买家确认收货</option>
                            <option value="COMPLETED" th:selected="${item.status == 'COMPLETED'}">已完成</option>
                            <option value="CANCELLED" th:selected="${item.status == 'CANCELLED'}">已取消</option>
                        </select>
                        <button class="btn btn-sm btn-outline-primary" type="submit">更新</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
