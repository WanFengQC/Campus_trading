<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单评价 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('orders', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="row g-4 justify-content-center">
        <div class="col-lg-8">
            <div class="card panel-card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h2 class="section-title mb-3">订单评价</h2>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <div class="mb-4">
                        <div class="small text-secondary">订单号</div>
                        <div class="fw-semibold" th:text="${order.orderNo}"></div>
                        <div class="small text-secondary mt-2">商品名称</div>
                        <div th:text="${order.goodsTitle}"></div>
                    </div>

                    <div class="alert alert-info" th:if="${existingReview != null}">
                        <div th:text="${'你已经提交过评价：' + existingReview.score + ' 分'}"></div>
                        <div th:text="${existingReview.content != null and existingReview.content != '' ? existingReview.content : '未填写文字评价。'}"></div>
                    </div>

                    <form method="post" th:if="${existingReview == null}">
                        <div class="mb-3">
                            <label class="form-label">评分</label>
                            <select class="form-select" name="score" required>
                                <option value="5">5 分，非常满意</option>
                                <option value="4">4 分，比较满意</option>
                                <option value="3">3 分，体验一般</option>
                                <option value="2">2 分，不太满意</option>
                                <option value="1">1 分，非常不满意</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">评价内容</label>
                            <textarea class="form-control" rows="5" maxlength="500" name="content"
                                      placeholder="可以填写商品情况、沟通体验、交易过程等"></textarea>
                        </div>
                        <button class="btn btn-primary" type="submit">提交评价</button>
                        <a class="btn btn-outline-secondary" th:href="@{/orders}">返回订单</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
