<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品市场 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('goods', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="market-hero rounded-4 p-4 p-md-5 mb-4">
        <div class="row g-4 align-items-center">
            <div class="col-lg-7">
                <div class="hero-chip hero-chip--dark">商品市场</div>
                <h1 class="market-title mb-3">在校园里更快找到值得买的二手好物</h1>
                <p class="market-copy mb-0">
                    把商品搜索、成色筛选、价格比较、收藏和下单放进同一个入口，
                    让商品市场更像商城，而不是一组分散功能页。
                </p>
            </div>
            <div class="col-lg-5">
                <div class="market-stat-grid">
                    <div class="market-stat-card">
                        <strong>支持搜索</strong>
                        <span>关键词、分类、价格区间</span>
                    </div>
                    <div class="market-stat-card">
                        <strong>支持筛选</strong>
                        <span>按成色快速缩小范围</span>
                    </div>
                    <div class="market-stat-card">
                        <strong>支持转化</strong>
                        <span>收藏、详情、购物车和下单</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="card panel-card border-0 shadow-sm mb-4 market-filter-card">
        <div class="card-body p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <div>
                    <h2 class="section-title mb-1">筛选商品</h2>
                    <p class="section-subtitle mb-0">先按条件缩小范围，再进入详情页判断是否值得买。</p>
                </div>
                <a class="btn btn-outline-primary btn-sm" th:href="@{/goods/publish}">我要发布</a>
            </div>

            <form class="row g-2 g-md-3" method="get" th:action="@{/goods}">
                <div class="col-md-4 col-lg-2">
                    <label class="form-label small text-secondary">分类</label>
                    <select class="form-select js-auto-submit-filter" name="categoryId">
                        <option value="">全部分类</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${q.categoryId != null and q.categoryId == category.id}"></option>
                    </select>
                </div>
                <div class="col-md-4 col-lg-2">
                    <label class="form-label small text-secondary">成色</label>
                    <select class="form-select js-auto-submit-filter" name="conditionLevel">
                        <option value="">全部成色</option>
                        <option value="全新" th:selected="${q.conditionLevel == '全新'}">全新</option>
                        <option value="九成新" th:selected="${q.conditionLevel == '九成新'}">九成新</option>
                        <option value="八成新" th:selected="${q.conditionLevel == '八成新'}">八成新</option>
                        <option value="七成新及以下" th:selected="${q.conditionLevel == '七成新及以下'}">七成新及以下</option>
                    </select>
                </div>
                <div class="col-md-4 col-lg-3">
                    <label class="form-label small text-secondary">关键词</label>
                    <input class="form-control" name="keyword" placeholder="搜索商品名称或关键词" th:value="${q.keyword}">
                </div>
                <div class="col-md-3 col-lg-2">
                    <label class="form-label small text-secondary">最低价</label>
                    <input class="form-control" name="minPrice" type="number" step="0.01" placeholder="最低价" th:value="${q.minPrice}">
                </div>
                <div class="col-md-3 col-lg-2">
                    <label class="form-label small text-secondary">最高价</label>
                    <input class="form-control" name="maxPrice" type="number" step="0.01" placeholder="最高价" th:value="${q.maxPrice}">
                </div>
                <div class="col-md-6 col-lg-1 d-grid align-self-end">
                    <button class="btn btn-primary" type="submit">搜索</button>
                </div>
            </form>
        </div>
    </section>

    <section>
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <div>
                <h2 class="section-title mb-1">商品列表</h2>
                <p class="section-subtitle mb-0">支持收藏、查看详情和进入购物车流程。</p>
            </div>
        </div>

        <div class="row g-3" th:if="${!items.isEmpty()}">
            <div class="col-md-6 col-lg-4" th:each="item : ${items}">
                <div class="card goods-card goods-card--market h-100 border-0 shadow-sm">
                    <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}"
                         class="card-img-top goods-cover"
                         alt="商品封面">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                            <h6 class="card-title mb-0" th:text="${item.title}"></h6>
                            <span class="goods-badge" th:text="${item.conditionLevel}"></span>
                        </div>
                        <p class="small text-secondary mb-2" th:text="${item.categoryName}"></p>
                        <p class="small text-secondary flex-grow-1"
                           th:text="${item.description != null and item.description.length() > 60 ? #strings.substring(item.description, 0, 60) + '...' : item.description}"></p>

                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="price-text" th:text="${'¥' + item.price}"></span>
                            <div class="d-flex gap-2">
                                <form th:if="${loggedIn}" method="post" th:action="@{/favorites/toggle}">
                                    <input type="hidden" name="goodsId" th:value="${item.id}">
                                    <button class="btn btn-sm"
                                            th:classappend="${favoriteGoodsIds != null and favoriteGoodsIds.contains(item.id) ? ' btn-outline-danger' : ' btn-outline-secondary'}"
                                            type="submit"
                                            th:text="${favoriteGoodsIds != null and favoriteGoodsIds.contains(item.id) ? '已收藏' : '收藏'}"></button>
                                </form>
                                <a class="btn btn-outline-primary btn-sm" th:href="@{'/goods/' + ${item.id}}">查看详情</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${items.isEmpty()}">
            当前筛选条件下暂无商品，换个关键词或价格区间再试。
        </div>
    </section>
</main>
<script>
    (function () {
        const form = document.querySelector(".market-filter-card form");
        if (!form) {
            return;
        }
        form.querySelectorAll(".js-auto-submit-filter").forEach(function (element) {
            element.addEventListener("change", function () {
                form.requestSubmit();
            });
        });
    })();
</script>
</body>
</html>
