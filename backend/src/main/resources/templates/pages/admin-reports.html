<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>举报管理 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('reports', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">举报管理</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/reports}">
                <div class="col-md-4">
                    <select class="form-select" name="status">
                        <option value="">全部处理状态</option>
                        <option value="PENDING" th:selected="${status == 'PENDING'}">待处理</option>
                        <option value="PROCESSING" th:selected="${status == 'PROCESSING'}">处理中</option>
                        <option value="RESOLVED" th:selected="${status == 'RESOLVED'}">已处理</option>
                        <option value="REJECTED" th:selected="${status == 'REJECTED'}">已驳回</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="targetType">
                        <option value="">全部目标类型</option>
                        <option value="GOODS" th:selected="${targetType == 'GOODS'}">商品</option>
                        <option value="USER" th:selected="${targetType == 'USER'}">用户</option>
                        <option value="ORDER" th:selected="${targetType == 'ORDER'}">订单</option>
                    </select>
                </div>
                <div class="col-md-4 d-grid">
                    <button class="btn btn-primary" type="submit">筛选</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>举报人</th>
                <th>目标</th>
                <th>举报原因</th>
                <th>状态</th>
                <th>提交时间</th>
                <th class="text-end">处理</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${items.isEmpty()}">
                <td colspan="7" class="text-center text-secondary py-4">当前没有符合条件的举报记录。</td>
            </tr>
            <tr th:each="item : ${items}">
                <td th:text="${item.id}"></td>
                <td th:text="${item.reporterName}"></td>
                <td>
                    <div th:text="${item.targetType + ' #' + item.targetId}"></div>
                    <div class="small text-secondary" th:text="${item.targetSummary}"></div>
                </td>
                <td>
                    <div th:text="${item.reason}"></div>
                    <div class="small text-secondary" th:if="${item.detail != null and item.detail != ''}" th:text="${item.detail}"></div>
                </td>
                <td><span class="badge order-badge" th:text="${item.statusLabel}"></span></td>
                <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <form method="post" th:action="@{'/admin/reports/' + ${item.id} + '/process'}">
                        <div class="d-flex flex-column gap-2 align-items-end">
                            <select class="form-select form-select-sm" style="width: 150px;" name="status">
                                <option value="PROCESSING" th:selected="${item.status == 'PROCESSING'}">处理中</option>
                                <option value="RESOLVED" th:selected="${item.status == 'RESOLVED'}">已处理</option>
                                <option value="REJECTED" th:selected="${item.status == 'REJECTED'}">已驳回</option>
                            </select>
                            <input class="form-control form-control-sm" style="width: 180px;" name="handleNote" maxlength="500"
                                   th:value="${item.handleNote}" placeholder="处理备注">
                            <button class="btn btn-sm btn-outline-primary" type="submit">提交处理</button>
                        </div>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
