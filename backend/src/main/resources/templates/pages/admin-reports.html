<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>濞戞挾鍋撴慨銈囩不閿涘嫭鍊?- 闁告艾楠歌ぐ鎾箳瑜嶉崺妤呭矗?/title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('reports', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">濞戞挾鍋撴慨銈囩不閿涘嫭鍊?/h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/reports}">
                <div class="col-md-4">
                    <select class="form-select" name="status">
                        <option value="">闁稿繈鍔戦崕鎾偐閼哥鍋?/option>
                        <option value="PENDING" th:selected="${status == 'PENDING'}">鐎垫澘鎳庨ˇ鈺呮偠?/option>
                        <option value="PROCESSING" th:selected="${status == 'PROCESSING'}">濠㈣泛瀚幃濠冪▔?/option>
                        <option value="RESOLVED" th:selected="${status == 'RESOLVED'}">鐎瑰憡褰冮ˇ鈺呮偠?/option>
                        <option value="REJECTED" th:selected="${status == 'REJECTED'}">鐎瑰憡鐓￠埞蹇涘炊?/option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="targetType">
                        <option value="">闁稿繈鍔戦崕瀵糕偓鐢殿攰閽栧嫮鐚剧拠鑼偓?/option>
                        <option value="GOODS" th:selected="${targetType == 'GOODS'}">闁哥喎妫楅幖?/option>
                        <option value="USER" th:selected="${targetType == 'USER'}">闁活潿鍔嶉崺?/option>
                        <option value="ORDER" th:selected="${targetType == 'ORDER'}">閻犱降鍨瑰畷?/option>
                    </select>
                </div>
                <div class="col-md-4 d-grid">
                    <button class="btn btn-primary" type="submit">缂佹稒鐩埀?/button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>缂傚倹鐗曡ぐ?/th>
                <th>濞戞挾鍋撴慨銈嗙?/th>
                <th>閻庣數顢婇挅?/th>
                <th>闁告鍠庡ú?/th>
                <th>闁绘鍩栭埀?/th>
                <th>闁圭粯鍔掑锕傚籍閸洘锛?/th>
                <th class="text-end">濠㈣泛瀚幃?/th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${items.isEmpty()}">
                <td colspan="7" class="text-center text-secondary py-4">闁哄棗鍊瑰Λ銈嗙▔閻愵剙袚閻犱焦婢樼紞?/td>
            </tr>
            <tr th:each="item : ${items}">
                <td th:text="${item.id}"></td>
                <td th:text="${item.reporterName}"></td>
                <td>
                    <div th:text="${item.targetType + ' #' + item.targetId}"></div>
                    <div class="small text-secondary" th:text="${item.targetSummary}"></div>
                </td>
                <td>
                    <div th:text="${item.reason}"></div>
                    <div class="small text-secondary" th:if="${item.detail != null and item.detail != ''}" th:text="${item.detail}"></div>
                </td>
                <td><span class="badge order-badge" th:text="${item.statusLabel}"></span></td>
                <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <form method="post" th:action="@{'/admin/reports/' + ${item.id} + '/process'}">
                        <div class="d-flex flex-column gap-2 align-items-end">
                            <select class="form-select form-select-sm" style="width: 150px;" name="status">
                                <option value="PROCESSING" th:selected="${item.status == 'PROCESSING'}">濠㈣泛瀚幃濠冪▔?/option>
                                <option value="RESOLVED" th:selected="${item.status == 'RESOLVED'}">鐎瑰憡褰冮ˇ鈺呮偠?/option>
                                <option value="REJECTED" th:selected="${item.status == 'REJECTED'}">鐎瑰憡鐓￠埞蹇涘炊?/option>
                            </select>
                            <input class="form-control form-control-sm" style="width: 180px;" name="handleNote" maxlength="500"
                                   th:value="${item.handleNote}" placeholder="濠㈣泛瀚幃濠勬嫚鐎涙ɑ顫栭柨娑樼墕瑜版煡鏌呮径娑氱">
                            <button class="btn btn-sm btn-outline-primary" type="submit">闁圭粯鍔掑?/button>
                        </div>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
