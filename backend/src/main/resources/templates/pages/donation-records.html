<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>认领记录 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('donations', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">认领记录</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="empty-state" th:if="${records.isEmpty()}">当前还没有你作为认领方发起的记录。</div>

    <div class="d-grid gap-3" th:if="${!records.isEmpty()}">
        <div class="card panel-card border-0 shadow-sm" th:each="record : ${records}">
            <div class="card-body">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3">
                    <div>
                        <div class="fw-semibold mb-1" th:text="${'记录 #' + record.recordId}"></div>
                        <div class="small text-secondary">
                            <span>你是认领方</span>
                            <span class="mx-2">|</span>
                            <span th:text="${#temporals.format(record.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </div>
                    <span class="badge order-badge" th:text="${record.statusLabel}"></span>
                </div>

                <div class="row g-3 align-items-center">
                    <div class="col-md-7">
                        <div class="d-flex align-items-center gap-3">
                            <img th:src="${record.donationCoverImageUrl != null ? record.donationCoverImageUrl : '/images/default-goods.svg'}"
                                 class="list-thumb"
                                 alt="捐赠物品封面">
                            <div>
                                <div class="fw-semibold" th:text="${record.donationTitle}"></div>
                                <div class="small text-secondary" th:text="${'捐赠方：' + record.donorName}"></div>
                                <div class="small text-secondary" th:text="${'认领方：' + record.claimerName}"></div>
                                <div class="small text-secondary"
                                     th:if="${record.claimRemark != null and record.claimRemark != ''}"
                                     th:text="${'认领备注：' + record.claimRemark}"></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="d-flex justify-content-md-end align-items-center gap-2 flex-wrap">
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{'/donations/' + ${record.donationItemId}}">查看物品</a>

                            <form th:if="${record.status == 'PENDING'}"
                                  method="post"
                                  th:action="@{'/donation-records/' + ${record.recordId} + '/cancel'}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">取消申请</button>
                            </form>

                            <form th:if="${record.status == 'APPROVED'}"
                                  method="post"
                                  th:action="@{'/donation-records/' + ${record.recordId} + '/complete'}">
                                <button class="btn btn-sm btn-success" type="submit">确认完成</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
