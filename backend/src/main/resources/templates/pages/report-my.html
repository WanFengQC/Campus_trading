<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的举报 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('account', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">我的举报记录</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="empty-state" th:if="${items.isEmpty()}">你还没有提交过举报。</div>

    <div class="d-grid gap-3" th:if="${!items.isEmpty()}">
        <div class="card panel-card border-0 shadow-sm" th:each="item : ${items}">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-semibold">
                        <span th:text="${item.targetType}"></span>
                        <span class="text-secondary">#</span>
                        <span th:text="${item.targetId}"></span>
                        <span class="text-secondary ms-2" th:text="${item.targetSummary}"></span>
                    </div>
                    <span class="badge order-badge" th:text="${item.statusLabel}"></span>
                </div>
                <div class="small text-secondary mb-1" th:text="${'举报原因：' + item.reason}"></div>
                <div class="small text-secondary mb-1"
                     th:text="${'提交时间：' + #temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                <div class="mb-2" th:text="${item.detail != null and item.detail != '' ? item.detail : '未填写补充说明。'}"></div>
                <div class="small text-secondary"
                     th:if="${item.handleNote != null and item.handleNote != ''}"
                     th:text="${'处理备注：' + item.handleNote}"></div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
