<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>编辑商品 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('goods', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="row g-4 align-items-start form-shell">
        <div class="col-lg-8">
            <div class="card panel-card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <div>
                            <h2 class="section-title mb-1">编辑商品信息</h2>
                            <p class="section-subtitle mb-0">修改后商品将重新进入审核，审核通过后再次展示。</p>
                        </div>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{'/goods/' + ${goods.id}}">返回详情</a>
                    </div>

                    <div class="alert alert-info">更新商品信息后，系统会重新审核该商品，请确认内容填写准确。</div>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form method="post" enctype="multipart/form-data" th:action="@{'/goods/' + ${goods.id} + '/edit'}">
                        <div class="mb-3">
                            <label class="form-label">商品标题</label>
                            <input class="form-control" name="title" required maxlength="128" th:value="${goods.title}">
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">商品分类</label>
                                <select class="form-select" name="categoryId" required>
                                    <option th:each="category : ${categories}"
                                            th:value="${category.id}"
                                            th:text="${category.name}"
                                            th:selected="${goods.categoryId == category.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">商品成色</label>
                                <select class="form-select" name="conditionLevel" required>
                                    <option value="全新" th:selected="${goods.conditionLevel == '全新'}">全新</option>
                                    <option value="九成新" th:selected="${goods.conditionLevel == '九成新'}">九成新</option>
                                    <option value="八成新" th:selected="${goods.conditionLevel == '八成新'}">八成新</option>
                                    <option value="七成新及以下" th:selected="${goods.conditionLevel == '七成新及以下'}">七成新及以下</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">价格</label>
                                <input class="form-control" name="price" type="number" step="0.01" min="0.01" required th:value="${goods.price}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">联系方式</label>
                                <input class="form-control" name="contactInfo" maxlength="64" required th:value="${goods.contactInfo}">
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">商品描述</label>
                            <textarea class="form-control" rows="5" maxlength="2000" name="description" th:text="${goods.description}"></textarea>
                        </div>

                        <div class="mt-3" th:if="${goods.coverImageUrl != null and goods.coverImageUrl != ''}">
                            <label class="form-label">当前封面</label>
                            <div>
                                <img th:src="${goods.coverImageUrl}" class="img-fluid rounded-3" style="max-width: 240px;" alt="当前商品图片">
                            </div>
                            <input type="hidden" name="coverImageUrl" th:value="${goods.coverImageUrl}">
                        </div>

                        <div class="mt-3">
                            <label class="form-label">重新上传图片</label>
                            <input class="form-control" type="file" name="imageFiles" multiple accept="image/png,image/jpeg,image/jpg,image/webp,image/gif">
                            <div class="form-hint">支持 jpg/jpeg/png/webp/gif，最多 9 张，单张不超过 5MB，全部图片合计不超过 30MB。</div>
                        </div>

                        <div class="form-check mt-3">
                            <input class="form-check-input" type="checkbox" value="true" id="clearImages" name="clearImages">
                            <label class="form-check-label" for="clearImages">清空当前图片，改为无图商品</label>
                        </div>

                        <button class="btn btn-primary mt-4" type="submit">提交修改</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
