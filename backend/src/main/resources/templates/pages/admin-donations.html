<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>捐赠管理 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('donations', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">捐赠管理</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/donations}">
                <div class="col-md-5">
                    <input class="form-control" name="keyword" placeholder="搜索捐赠物品标题或联系人" th:value="${keyword}">
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="itemStatus">
                        <option value="">全部物品状态</option>
                        <option value="AVAILABLE" th:selected="${itemStatus == 'AVAILABLE'}">可认领</option>
                        <option value="CLAIM_PENDING" th:selected="${itemStatus == 'CLAIM_PENDING'}">认领申请中</option>
                        <option value="CLAIMED" th:selected="${itemStatus == 'CLAIMED'}">已被认领</option>
                        <option value="OFF_SHELF" th:selected="${itemStatus == 'OFF_SHELF'}">已下架</option>
                    </select>
                </div>
                <div class="col-md-3 d-grid">
                    <button class="btn btn-primary" type="submit">筛选物品</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2 mb-4">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>物品标题</th>
                <th>捐赠人</th>
                <th>分类</th>
                <th>联系方式</th>
                <th>取件地点</th>
                <th>状态</th>
                <th>发布时间</th>
                <th class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${items.isEmpty()}">
                <td colspan="9" class="text-center text-secondary py-4">当前没有符合条件的捐赠物品。</td>
            </tr>
            <tr th:each="item : ${items}">
                <td th:text="${item.itemId}"></td>
                <td class="fw-semibold" th:text="${item.title}"></td>
                <td th:text="${item.donorName}"></td>
                <td th:text="${item.categoryName}"></td>
                <td th:text="${item.contactInfo}"></td>
                <td th:text="${item.pickupAddress != null and item.pickupAddress != '' ? item.pickupAddress : '-'}"></td>
                <td><span class="badge order-badge" th:text="${item.statusLabel}"></span></td>
                <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <form class="d-inline-flex align-items-center gap-2" method="post" th:action="@{'/admin/donations/items/' + ${item.itemId} + '/status'}">
                        <select class="form-select form-select-sm" style="width: 170px;" name="status">
                            <option value="AVAILABLE" th:selected="${item.status == 'AVAILABLE'}">可认领</option>
                            <option value="CLAIM_PENDING" th:selected="${item.status == 'CLAIM_PENDING'}">认领申请中</option>
                            <option value="CLAIMED" th:selected="${item.status == 'CLAIMED'}">已被认领</option>
                            <option value="OFF_SHELF" th:selected="${item.status == 'OFF_SHELF'}">已下架</option>
                        </select>
                        <button class="btn btn-sm btn-outline-primary" type="submit">更新</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/donations}">
                <input type="hidden" name="keyword" th:value="${keyword}">
                <input type="hidden" name="itemStatus" th:value="${itemStatus}">
                <div class="col-md-9">
                    <select class="form-select" name="recordStatus">
                        <option value="">全部认领记录状态</option>
                        <option value="PENDING" th:selected="${recordStatus == 'PENDING'}">待处理</option>
                        <option value="APPROVED" th:selected="${recordStatus == 'APPROVED'}">已同意</option>
                        <option value="REJECTED" th:selected="${recordStatus == 'REJECTED'}">已拒绝</option>
                        <option value="CANCELLED" th:selected="${recordStatus == 'CANCELLED'}">已取消</option>
                        <option value="COMPLETED" th:selected="${recordStatus == 'COMPLETED'}">已完成</option>
                    </select>
                </div>
                <div class="col-md-3 d-grid">
                    <button class="btn btn-primary" type="submit">筛选记录</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>捐赠物品</th>
                <th>捐赠人</th>
                <th>认领人</th>
                <th>认领备注</th>
                <th>状态</th>
                <th>申请时间</th>
                <th class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${records.isEmpty()}">
                <td colspan="8" class="text-center text-secondary py-4">当前没有符合条件的认领记录。</td>
            </tr>
            <tr th:each="record : ${records}">
                <td th:text="${record.recordId}"></td>
                <td th:text="${record.donationTitle}"></td>
                <td th:text="${record.donorName}"></td>
                <td th:text="${record.claimerName}"></td>
                <td th:text="${record.claimRemark != null and record.claimRemark != '' ? record.claimRemark : '-'}"></td>
                <td><span class="badge order-badge" th:text="${record.statusLabel}"></span></td>
                <td th:text="${#temporals.format(record.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <form class="d-inline-flex align-items-center gap-2" method="post" th:action="@{'/admin/donations/records/' + ${record.recordId} + '/status'}">
                        <select class="form-select form-select-sm" style="width: 170px;" name="status">
                            <option value="PENDING" th:selected="${record.status == 'PENDING'}">待处理</option>
                            <option value="APPROVED" th:selected="${record.status == 'APPROVED'}">已同意</option>
                            <option value="REJECTED" th:selected="${record.status == 'REJECTED'}">已拒绝</option>
                            <option value="CANCELLED" th:selected="${record.status == 'CANCELLED'}">已取消</option>
                            <option value="COMPLETED" th:selected="${record.status == 'COMPLETED'}">已完成</option>
                        </select>
                        <button class="btn btn-sm btn-outline-primary" type="submit">更新</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
