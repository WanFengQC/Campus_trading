<!DOCTYPE html>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-semibold" th:text="${item.goodsTitle}"></div>
                    <span class="badge text-bg-success" th:text="${item.score + ' 闁?}"></span>
