<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的评价 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('account', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">我写出的评价</h2>
    <div class="empty-state mb-3" th:if="${writtenReviews.isEmpty()}">你还没有写过评价。</div>
    <div class="d-grid gap-3 mb-4" th:if="${!writtenReviews.isEmpty()}">
        <div class="card panel-card border-0 shadow-sm" th:each="item : ${writtenReviews}">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-semibold" th:text="${item.goodsTitle}"></div>
                    <span class="badge text-bg-primary" th:text="${item.score + ' 分'}"></span>
                </div>
                <div class="small text-secondary mb-1" th:text="${'评价对象：' + item.revieweeName}"></div>
                <div class="small text-secondary mb-1"
                     th:text="${'评价时间：' + #temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                <div th:text="${item.content != null and item.content != '' ? item.content : '未填写文字评价。'}"></div>
            </div>
        </div>
    </div>

    <h2 class="section-title mb-3">我收到的评价</h2>
    <div class="empty-state" th:if="${receivedReviews.isEmpty()}">你还没有收到评价。</div>
    <div class="d-grid gap-3" th:if="${!receivedReviews.isEmpty()}">
        <div class="card panel-card border-0 shadow-sm" th:each="item : ${receivedReviews}">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-semibold" th:text="${item.goodsTitle}"></div>
                    <span class="badge text-bg-success" th:text="${item.score + ' 分'}"></span>
                </div>
                <div class="small text-secondary mb-1" th:text="${'评价人：' + item.reviewerName}"></div>
                <div class="small text-secondary mb-1"
                     th:text="${'评价时间：' + #temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                <div th:text="${item.content != null and item.content != '' ? item.content : '未填写文字评价。'}"></div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
