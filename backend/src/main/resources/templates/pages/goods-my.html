<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的商品 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('goods', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">我的商品与卖方订单</h2>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <div>
                    <h3 class="section-title mb-1">待你处理的商品订单</h3>
                    <p class="section-subtitle mb-0">这里只显示你作为卖家的商品订单，可直接确认接单。</p>
                </div>
            </div>

            <div class="empty-state py-4" th:if="${sellerOrders == null or sellerOrders.isEmpty()}">当前没有你作为卖家的商品订单。</div>

            <div class="d-grid gap-3" th:if="${sellerOrders != null and !sellerOrders.isEmpty()}">
                <div class="card order-card border-0 shadow-sm" th:each="order : ${sellerOrders}">
                    <div class="card-body p-4">
                        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
                            <div>
                                <div class="fw-semibold mb-1">订单号：<span th:text="${order.orderNo}"></span></div>
                                <div class="small text-secondary">
                                    <span>你是卖家</span>
                                    <span class="mx-2">|</span>
                                    <span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                </div>
                            </div>
                            <span class="badge order-badge" th:text="${order.statusLabel}"></span>
                        </div>

                        <div class="row g-3 align-items-center">
                            <div class="col-lg-7">
                                <div class="d-flex align-items-center gap-3 order-goods-row">
                                    <img th:src="${order.goodsCoverImageUrl != null ? order.goodsCoverImageUrl : '/images/default-goods.svg'}"
                                         class="list-thumb"
                                         alt="商品图片">
                                    <div>
                                        <div class="fw-semibold" th:text="${order.goodsTitle}"></div>
                                        <div class="small text-secondary">买家：<span th:text="${order.buyerName}"></span></div>
                                        <div class="small text-secondary" th:if="${order.buyerRemark != null and order.buyerRemark != ''}">买家备注：<span th:text="${order.buyerRemark}"></span></div>
                                        <div class="small text-secondary" th:if="${order.meetupTime != null}">见面时间：<span th:text="${#temporals.format(order.meetupTime, 'yyyy-MM-dd HH:mm')}"></span></div>
                                        <div class="small text-secondary" th:if="${order.meetupLocation != null and order.meetupLocation != ''}">见面地点：<span th:text="${order.meetupLocation}"></span></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-5">
                                <div class="d-flex justify-content-lg-end align-items-center gap-2 flex-wrap order-actions">
                                    <div class="price-text me-lg-2" th:text="${'¥' + order.amount}"></div>
                                    <a class="btn btn-sm btn-outline-secondary" th:href="@{'/goods/' + ${order.goodsId}}">商品详情</a>
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/orders/' + ${order.orderId}}">订单详情</a>
                                    <form th:if="${order.status == 'PENDING'}" method="post" th:action="@{'/orders/' + ${order.orderId} + '/seller-confirm'}">
                                        <button class="btn btn-sm btn-primary" type="submit">确认接单</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>商品</th>
                <th>价格</th>
                <th>成色</th>
                <th>上架状态</th>
                <th>审核状态</th>
                <th>审核说明</th>
                <th class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${items.isEmpty()}">
                <td colspan="7" class="text-center text-secondary py-4">你还没有发布商品，先去上架一件试试。</td>
            </tr>
            <tr th:each="item : ${items}">
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}" class="list-thumb" alt="商品封面">
                        <div>
                            <div class="fw-semibold" th:text="${item.title}"></div>
                            <div class="small text-secondary" th:text="${item.categoryName}"></div>
                        </div>
                    </div>
                </td>
                <td class="price-text" th:text="${'¥' + item.price}"></td>
                <td th:text="${item.conditionLevel}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${item.status == 'ON_SHELF' ? ' text-bg-success' : ((soldGoodsIds != null and soldGoodsIds.contains(item.id)) ? ' text-bg-primary' : ' text-bg-secondary')}"
                          th:text="${item.status == 'ON_SHELF' ? '在售' : ((soldGoodsIds != null and soldGoodsIds.contains(item.id)) ? '已售出' : '已下架')}"></span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${item.auditStatus == 'APPROVED' ? ' text-bg-success' : (item.auditStatus == 'REJECTED' ? ' text-bg-danger' : ' text-bg-warning')}"
                          th:text="${item.auditStatusLabel != null ? item.auditStatusLabel : '待审核'}"></span>
                </td>
                <td>
                    <div th:text="${item.auditNote != null and item.auditNote != '' ? item.auditNote : '-'}"></div>
                    <div class="small text-secondary" th:if="${item.auditTime != null}"
                         th:text="${#temporals.format(item.auditTime, 'yyyy-MM-dd HH:mm')}"></div>
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/goods/' + ${item.id}}">查看</a>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{'/goods/' + ${item.id} + '/edit'}">编辑</a>
                    <form class="d-inline" method="post" th:action="@{'/goods/' + ${item.id} + '/off-shelf'}">
                        <button class="btn btn-sm btn-outline-danger" type="submit" th:disabled="${item.status != 'ON_SHELF'}">下架</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
