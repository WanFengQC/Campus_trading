<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>提交举报 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('account', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="row g-4 justify-content-center">
        <div class="col-lg-8">
            <div class="card panel-card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h2 class="section-title mb-3">提交举报</h2>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form method="post" th:action="@{/reports/create}">
                        <div class="mb-3">
                            <label class="form-label">举报目标类型</label>
                            <input class="form-control" type="text" value="商品" readonly>
                            <input type="hidden" name="targetType" value="GOODS">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">举报目标 ID</label>
                            <input class="form-control" type="text" th:value="${targetId}" readonly>
                            <input type="hidden" name="targetId" th:value="${targetId}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">举报原因</label>
                            <input class="form-control" type="text" maxlength="128" name="reason" required placeholder="例如：虚假描述、辱骂骚扰、恶意违约">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">补充说明</label>
                            <textarea class="form-control" rows="5" maxlength="500" name="detail" placeholder="可补充交易经过、聊天情况、具体问题等"></textarea>
                        </div>

                        <button class="btn btn-danger" type="submit">提交举报</button>
                        <a class="btn btn-outline-secondary" th:href="@{/reports/my}">返回我的举报</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
