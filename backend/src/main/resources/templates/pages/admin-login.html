<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员登录 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-bg auth-bg--minimal">
<div class="container py-5 auth-shell auth-shell--minimal">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="card auth-card auth-card--minimal border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="auth-minimal-head">
                        <div class="auth-kicker auth-kicker--minimal">后台管理</div>
                        <h1 class="auth-minimal-title">管理员登录</h1>
                        <p class="auth-minimal-copy">登录后台后可统一管理用户、商品、订单、公告和举报信息。</p>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form method="post" th:action="@{/admin/login}" class="auth-form auth-form--minimal">
                        <div class="mb-3">
                            <label class="form-label">管理员账号</label>
                            <input class="form-control form-control-lg" type="text" name="username" maxlength="64" required placeholder="请输入管理员账号">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">密码</label>
                            <input class="form-control form-control-lg" type="password" name="password" maxlength="64" required placeholder="请输入后台密码">
                        </div>
                        <button class="btn btn-primary btn-lg w-100 auth-submit-btn" type="submit">登录后台</button>
                    </form>

                    <div class="small text-secondary text-center mt-4">
                        如需进入后台，请使用已分配的管理员账号和密码登录。
                    </div>
                    <div class="auth-admin-entry mt-3">
                        <a class="btn btn-link btn-sm" th:href="@{/}">返回商城</a>
                        <a class="btn btn-link btn-sm" th:href="@{/login}">切换到用户登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
