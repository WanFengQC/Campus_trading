<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>缂備礁顦遍崰鏇犵矈閿旂偓鏆滈柛灞剧缁?- 闂佸搫绉埀顒冩珪閻ゎ喖霉濠婂啯婀板褎绮嶇粋宥夊Χ閸℃﹩娼ㄥΔ鐘靛仜閸熻儻銇?/title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('rentals', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/rentals}">
                <div class="col-md-3">
                    <input class="form-control" name="keyword" placeholder="搜索租赁标题或关键词" th:value="${keyword}">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="categoryId">
                        <option value="">闂佺绻堥崝鎴﹀磿閹绢喖绀嗛柛鈩冪懆椤?/option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${categoryId != null and categoryId == category.id}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input class="form-control" name="minDailyRent" type="number" step="0.01" placeholder="最低日租" th:value="${minDailyRent}">
                </div>
                <div class="col-md-2">
                    <input class="form-control" name="maxDailyRent" type="number" step="0.01" placeholder="最高日租" th:value="${maxDailyRent}">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">缂備焦绋掗惄顖炲焵?/button>
                </div>
            </form>
        </div>
    </div>

    <div class="row g-3" th:if="${!items.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="item : ${items}">
            <div class="card goods-card h-100 border-0 shadow-sm">
                <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}"
                     class="card-img-top goods-cover"
                     alt="租赁物品封面">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title mb-1" th:text="${item.title}"></h6>
                    <p class="small text-secondary mb-2" th:text="${item.categoryName + ' 閻?闂佺娉涢妶鎼佸闯?婵? + item.deposit}"></p>
                    <p class="small text-secondary flex-grow-1"
                       th:text="${item.description != null and item.description.length() > 60 ? #strings.substring(item.description, 0, 60) + '...' : item.description}"></p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="price-text" th:text="${'闂佸搫鍟ㄩ崕鎶斤綖?婵? + item.dailyRent}"></span>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{'/rentals/' + ${item.id}}">闂佸搫琚崕鍐诧耿閸涱垱瀚氶柨鏃囨閸?/a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${items.isEmpty()}">
        闂佸搫妫楅崐鐟拔涢妶澶婄煑妞ゆ牗绮犲鎶芥偣瑜岀粈渚€寮查姀銈呬紶濞撴艾锕︾粈澶愭煙鐠団剝绶氶梺鍙夌矒瀵爼鍨鹃崣澶樺仺闁荤姴娲﹀ú婵嬫儊椤栫偛违?    </div>
</main>
</body>
</html>
