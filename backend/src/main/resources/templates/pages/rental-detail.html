<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>租赁物品详情 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('rentals', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="detail-shell row g-4 align-items-start">
        <div class="col-lg-7">
            <div class="card panel-card border-0 shadow-sm overflow-hidden">
                <div class="card-body p-3 p-md-4">
                    <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}"
                         class="img-fluid detail-cover rounded-4"
                         alt="租赁物品封面">
                </div>
            </div>

            <div class="card panel-card border-0 shadow-sm mt-4">
                <div class="card-body p-4 p-md-5">
                    <div class="section-head mb-3">
                        <div>
                            <h2 class="section-title mb-1">物品说明</h2>
                            <p class="section-subtitle mb-0">确认租金、押金、联系人和租期安排后再提交租赁申请。</p>
                        </div>
                    </div>
                    <div class="detail-description"
                         th:text="${item.description != null and item.description != '' ? item.description : '发布者暂未填写详细说明。'}"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card panel-card border-0 shadow-sm detail-summary-card">
                <div class="card-body p-4 p-md-5">
                    <div class="detail-badges d-flex flex-wrap gap-2 mb-3">
                        <span class="badge text-bg-light" th:text="${item.categoryName}"></span>
                        <span class="badge"
                              th:classappend="${item.status == 'AVAILABLE' ? ' text-bg-success' : ' text-bg-secondary'}"
                              th:text="${item.status == 'AVAILABLE' ? '可租赁' : (item.status == 'RENTING' ? '租赁中' : '已下架')}"></span>
                    </div>

                    <h1 class="detail-title mb-2" th:text="${item.title}"></h1>
                    <div class="price-text detail-price-block mb-2" th:text="${'¥' + item.dailyRent + '/天'}"></div>
                    <p class="text-secondary mb-4" th:text="${'押金：¥' + item.deposit}"></p>

                    <div class="info-list detail-info-list mb-4">
                        <p><strong>发布者</strong><span th:text="${item.ownerName}"></span></p>
                        <p><strong>联系方式</strong><span th:text="${item.contactInfo}"></span></p>
                    </div>

                    <div class="d-grid gap-2 mb-4" th:if="${loggedIn and session.LOGIN_USER_ID != item.ownerId}">
                        <a class="btn btn-outline-primary"
                           th:href="@{'/chat?peerUserId=' + ${item.ownerId}}">联系出租方</a>
                    </div>

                    <form method="post" th:action="@{'/rentals/' + ${item.id} + '/order'}" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">开始日期</label>
                            <input class="form-control" type="date" name="startDate" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">结束日期</label>
                            <input class="form-control" type="date" name="endDate" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">备注说明</label>
                            <input class="form-control" type="text" maxlength="255" name="renterRemark"
                                   placeholder="例如：希望周五下午取件，可在教学楼东门交接">
                        </div>
                        <div class="col-12 d-grid gap-2">
                            <button class="btn btn-primary"
                                    type="submit"
                                    th:disabled="${item.status != 'AVAILABLE'}"
                                    th:text="${item.status == 'AVAILABLE' ? '提交租赁申请' : '当前不可租赁'}"></button>
                            <a class="btn btn-outline-secondary" th:href="@{/rentals}">返回租赁市场</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
