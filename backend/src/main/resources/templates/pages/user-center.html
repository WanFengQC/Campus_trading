<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人中心 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('account', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="row g-4 align-items-start dashboard-grid">
        <div class="col-lg-4">
            <div class="card panel-card border-0 shadow-sm profile-card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img class="avatar-image mb-3"
                             th:src="${profile.avatarUrl != null and profile.avatarUrl != '' ? profile.avatarUrl : '/images/default-avatar.svg'}"
                             alt="用户头像">
                        <h2 class="h4 mb-1" th:text="${profile.nickname != null and profile.nickname != '' ? profile.nickname : profile.username}"></h2>
                        <div class="text-secondary" th:text="${profile.username}"></div>
                    </div>

                    <dl class="row mb-0 profile-meta">
                        <dt class="col-5">用户 ID</dt>
                        <dd class="col-7" th:text="${profile.userId}"></dd>
                        <dt class="col-5">账号状态</dt>
                        <dd class="col-7" th:text="${profile.status == 1 ? '正常' : '禁用'}"></dd>
                        <dt class="col-5">审核状态</dt>
                        <dd class="col-7" th:text="${profile.auditStatus == 'APPROVED' ? '已通过' : (profile.auditStatus == 'REJECTED' ? '未通过' : '待审核')}"></dd>
                        <dt class="col-5">审核说明</dt>
                        <dd class="col-7" th:text="${profile.auditNote != null and profile.auditNote != '' ? profile.auditNote : '-'}"></dd>
                    </dl>
                </div>
            </div>

            <div class="card panel-card border-0 shadow-sm mt-4">
                <div class="card-body p-4">
                    <h3 class="section-title mb-3">快捷入口</h3>
                    <div class="link-grid">
                        <a class="account-link-card" th:href="@{/goods/my}">我的商品</a>
                        <a class="account-link-card" th:href="@{/rentals/my}">我的租赁</a>
                        <a class="account-link-card" th:href="@{/donations/my}">我的捐赠</a>
                        <a class="account-link-card" th:href="@{/donation-records}">捐赠记录</a>
                        <a class="account-link-card" th:href="@{/reviews/my}">我的评价</a>
                        <a class="account-link-card" th:href="@{/reports/my}">我的举报</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card panel-card border-0 shadow-sm mb-4">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                        <div>
                            <h1 class="section-title mb-1">个人资料</h1>
                            <p class="section-subtitle mb-0">在这里更新昵称、头像和账号相关信息。</p>
                        </div>
                    </div>

                    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <div class="card bg-light border-0 rounded-4 mb-4">
                        <div class="card-body p-3 p-md-4">
                            <div class="d-flex flex-wrap gap-3 align-items-center">
                                <img class="avatar-image"
                                     th:src="${profile.avatarUrl != null and profile.avatarUrl != '' ? profile.avatarUrl : '/images/default-avatar.svg'}"
                                     alt="头像预览">
                                <form class="d-flex flex-column gap-2 flex-grow-1" method="post" enctype="multipart/form-data" th:action="@{/user/avatar}">
                                    <input class="form-control form-control-sm" type="file" name="file" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif" required>
                                    <div class="d-flex flex-wrap gap-2 align-items-center">
                                        <button class="btn btn-sm btn-outline-primary" type="submit">上传头像</button>
                                        <span class="text-secondary small">支持 jpg/jpeg/png/webp/gif，最大 2MB</span>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <form method="post" th:action="@{/user/profile}">
                        <input type="hidden" name="avatarUrl" th:value="${profile.avatarUrl}">
                        <div class="mb-3">
                            <label class="form-label">昵称</label>
                            <input class="form-control" name="nickname" required maxlength="64" th:value="${profile.nickname}">
                        </div>
                        <button class="btn btn-primary" type="submit">保存资料</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
