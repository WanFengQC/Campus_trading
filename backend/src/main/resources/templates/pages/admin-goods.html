<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品管理 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('goods', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">商品管理</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/goods}">
                <div class="col-md-4">
                    <input class="form-control" name="keyword" placeholder="搜索商品标题或卖家" th:value="${keyword}">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">全部上架状态</option>
                        <option value="ON_SHELF" th:selected="${status == 'ON_SHELF'}">在售</option>
                        <option value="OFF_SHELF" th:selected="${status == 'OFF_SHELF'}">已下架</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="auditStatus">
                        <option value="">全部审核状态</option>
                        <option value="PENDING" th:selected="${auditStatus == 'PENDING'}">待审核</option>
                        <option value="APPROVED" th:selected="${auditStatus == 'APPROVED'}">已通过</option>
                        <option value="REJECTED" th:selected="${auditStatus == 'REJECTED'}">已驳回</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">搜索</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>商品信息</th>
                <th>卖家</th>
                <th>分类</th>
                <th>价格</th>
                <th>上架状态</th>
                <th>审核状态</th>
                <th>审核说明</th>
                <th>发布时间</th>
                <th class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${items.isEmpty()}">
                <td colspan="10" class="text-center text-secondary py-4">当前没有符合条件的商品。</td>
            </tr>
            <tr th:each="item : ${items}">
                <td th:text="${item.goodsId}"></td>
                <td>
                    <div class="fw-semibold" th:text="${item.title}"></div>
                    <div class="small text-secondary" th:text="${item.contactInfo}"></div>
                </td>
                <td th:text="${item.sellerName}"></td>
                <td th:text="${item.categoryName}"></td>
                <td class="price-text" th:text="${'¥' + item.price}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${item.status == 'ON_SHELF' ? ' text-bg-success' : ' text-bg-secondary'}"
                          th:text="${item.status == 'ON_SHELF' ? '在售' : '已下架'}"></span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${item.auditStatus == 'APPROVED' ? ' text-bg-success' : (item.auditStatus == 'REJECTED' ? ' text-bg-danger' : ' text-bg-warning')}"
                          th:text="${item.auditStatusLabel}"></span>
                </td>
                <td>
                    <div th:text="${item.auditNote != null and item.auditNote != '' ? item.auditNote : '-'}"></div>
                    <div class="small text-secondary" th:if="${item.auditTime != null}"
                         th:text="${#temporals.format(item.auditTime, 'yyyy-MM-dd HH:mm')}"></div>
                </td>
                <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/goods/' + ${item.goodsId}}">查看</a>
                    <form class="d-inline" method="post" th:action="@{'/admin/goods/' + ${item.goodsId} + '/audit'}"
                          th:if="${item.auditStatus == 'PENDING'}">
                        <input type="hidden" name="auditStatus" value="APPROVED">
                        <input type="hidden" name="auditNote" value="审核通过">
                        <button class="btn btn-sm btn-outline-success" type="submit">通过</button>
                    </form>
                    <form class="d-inline" method="post" th:action="@{'/admin/goods/' + ${item.goodsId} + '/audit'}"
                          th:if="${item.auditStatus == 'PENDING'}">
                        <input type="hidden" name="auditStatus" value="REJECTED">
                        <input class="form-control form-control-sm d-inline-block" style="width: 140px;"
                               name="auditNote" maxlength="255" placeholder="驳回原因">
                        <button class="btn btn-sm btn-outline-warning" type="submit">驳回</button>
                    </form>
                    <form class="d-inline" method="post" th:action="@{'/admin/goods/' + ${item.goodsId} + '/off-shelf'}"
                          th:if="${item.auditStatus == 'APPROVED' and item.status == 'ON_SHELF'}">
                        <button class="btn btn-sm btn-outline-danger" type="submit">下架</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
