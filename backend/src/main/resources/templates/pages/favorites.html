<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的收藏 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('favorites', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">我的收藏</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="row g-3" th:if="${!items.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="item : ${items}">
            <div class="card goods-card h-100 border-0 shadow-sm">
                <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}"
                     class="card-img-top goods-cover"
                     alt="商品封面">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title mb-1" th:text="${item.title}"></h6>
                    <p class="small text-secondary mb-2" th:text="${item.categoryName + ' · ' + item.conditionLevel}"></p>
                    <p class="small text-secondary flex-grow-1"
                       th:text="${item.description != null and item.description.length() > 60 ? #strings.substring(item.description, 0, 60) + '...' : item.description}"></p>

                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="price-text" th:text="${'¥' + item.price}"></span>
                        <div class="d-flex gap-2">
                            <form method="post" th:action="@{/favorites/toggle}">
                                <input type="hidden" name="goodsId" th:value="${item.goodsId}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">取消收藏</button>
                            </form>
                            <a class="btn btn-sm btn-outline-primary" th:href="@{'/goods/' + ${item.goodsId}}">查看详情</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${items.isEmpty()}">
        你还没有收藏商品，去逛逛把感兴趣的商品加入收藏吧。
    </div>
</main>
</body>
</html>
