<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户管理 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: adminNav('users', ${adminName})}"></div>

<main class="container py-4 py-md-5 page-main">
    <h2 class="section-title mb-3">用户管理</h2>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card panel-card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/users}">
                <div class="col-md-10">
                    <input class="form-control" name="keyword" placeholder="搜索用户名、昵称或学号" th:value="${keyword}">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">搜索</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-2">
        <table class="table align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>用户名</th>
                <th>昵称</th>
                <th>账号状态</th>
                <th>审核状态</th>
                <th>审核说明</th>
                <th>注册时间</th>
                <th class="text-end">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${users.isEmpty()}">
                <td colspan="8" class="text-center text-secondary py-4">当前没有符合条件的用户。</td>
            </tr>
            <tr th:each="item : ${users}">
                <td th:text="${item.userId}"></td>
                <td th:text="${item.username}"></td>
                <td th:text="${item.nickname}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${item.status == 1 ? ' text-bg-success' : ' text-bg-secondary'}"
                          th:text="${item.status == 1 ? '正常' : '已禁用'}"></span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${item.auditStatus == 'APPROVED' ? ' text-bg-success' : (item.auditStatus == 'REJECTED' ? ' text-bg-danger' : ' text-bg-warning')}"
                          th:text="${item.auditStatusLabel}"></span>
                </td>
                <td>
                    <div th:text="${item.auditNote != null and item.auditNote != '' ? item.auditNote : '-'}"></div>
                    <div class="small text-secondary" th:if="${item.auditTime != null}"
                         th:text="${#temporals.format(item.auditTime, 'yyyy-MM-dd HH:mm')}"></div>
                </td>
                <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-end">
                    <div class="d-flex justify-content-end gap-1 flex-wrap">
                        <form class="d-inline" method="post" th:action="@{'/admin/users/' + ${item.userId} + '/status'}">
                            <input type="hidden" name="status" th:value="${item.status == 1 ? 0 : 1}">
                            <button class="btn btn-sm"
                                    th:classappend="${item.status == 1 ? ' btn-outline-danger' : ' btn-outline-success'}"
                                    type="submit"
                                    th:text="${item.status == 1 ? '禁用' : '启用'}"></button>
                        </form>

                        <form class="d-inline" method="post" th:action="@{'/admin/users/' + ${item.userId} + '/audit'}"
                              th:if="${item.auditStatus != 'APPROVED'}">
                            <input type="hidden" name="auditStatus" value="APPROVED">
                            <input type="hidden" name="auditNote" value="审核通过">
                            <button class="btn btn-sm btn-outline-primary" type="submit">通过</button>
                        </form>

                        <form class="d-inline" method="post" th:action="@{'/admin/users/' + ${item.userId} + '/audit'}"
                              th:if="${item.auditStatus != 'REJECTED'}">
                            <input type="hidden" name="auditStatus" value="REJECTED">
                            <input class="form-control form-control-sm d-inline-block" style="width: 140px;"
                                   name="auditNote" maxlength="255" placeholder="驳回原因">
                            <button class="btn btn-sm btn-outline-warning" type="submit">驳回</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
