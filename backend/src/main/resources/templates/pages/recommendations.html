<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>推荐中心 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('recommendations', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <section class="card panel-card border-0 shadow-sm mb-4 recommendation-hero">
        <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-2">猜你喜欢</h1>
            <p class="text-secondary mb-0">
                根据你的浏览与收藏记录，为你优先展示可能感兴趣的商品；同时也会提供平台热门商品供你快速浏览。
            </p>
        </div>
    </section>

    <section class="mb-4" th:if="${loggedIn}">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="section-title mb-0">个性化推荐</h2>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/history}">查看浏览记录</a>
        </div>
        <div class="row g-3" th:if="${personalItems != null and !personalItems.isEmpty()}">
            <div class="col-md-6 col-lg-4" th:each="item : ${personalItems}">
                <div class="card goods-card h-100 border-0 shadow-sm">
                    <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}"
                         class="card-img-top goods-cover"
                         alt="商品封面">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title mb-1" th:text="${item.title}"></h6>
                        <p class="small text-secondary mb-2" th:text="${item.categoryName + ' · ' + item.conditionLevel}"></p>
                        <p class="small text-secondary flex-grow-1"
                           th:text="${item.description != null and item.description.length() > 60 ? #strings.substring(item.description, 0, 60) + '...' : item.description}"></p>
                        <div class="recommend-reason mb-2" th:text="${item.recommendReason}"></div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="price-text" th:text="${'¥' + item.price}"></span>
                            <a class="btn btn-outline-primary btn-sm" th:href="@{'/goods/' + ${item.goodsId}}">查看详情</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="empty-state" th:if="${personalItems == null or personalItems.isEmpty()}">
            暂无个性化推荐，先去浏览或收藏一些商品，我们会为你生成更准确的推荐。
        </div>
    </section>

    <section>
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="section-title mb-0">热门商品</h2>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/goods}">查看更多商品</a>
        </div>
        <div class="row g-3" th:if="${hotItems != null and !hotItems.isEmpty()}">
            <div class="col-md-6 col-lg-4" th:each="item : ${hotItems}">
                <div class="card goods-card h-100 border-0 shadow-sm">
                    <img th:src="${item.coverImageUrl != null ? item.coverImageUrl : '/images/default-goods.svg'}"
                         class="card-img-top goods-cover"
                         alt="商品封面">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title mb-1" th:text="${item.title}"></h6>
                        <p class="small text-secondary mb-2" th:text="${item.categoryName + ' · ' + item.conditionLevel}"></p>
                        <p class="small text-secondary flex-grow-1"
                           th:text="${item.description != null and item.description.length() > 60 ? #strings.substring(item.description, 0, 60) + '...' : item.description}"></p>
                        <div class="recommend-reason mb-2" th:text="${item.recommendReason}"></div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="price-text" th:text="${'¥' + item.price}"></span>
                            <a class="btn btn-outline-primary btn-sm" th:href="@{'/goods/' + ${item.goodsId}}">查看详情</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="empty-state" th:if="${hotItems == null or hotItems.isEmpty()}">
            当前暂无热门商品，稍后再来看看。
        </div>
    </section>
</main>
</body>
</html>
