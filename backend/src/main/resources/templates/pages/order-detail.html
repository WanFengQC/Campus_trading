<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单详情 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: storeNav('orders', ${loggedIn})}"></div>

<main class="container py-4 py-md-5 page-main">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card panel-card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <h2 class="section-title mb-1">订单详情</h2>
                    <div class="small text-secondary mb-3" th:text="${'订单号：' + order.orderNo}"></div>

                    <div class="d-flex align-items-center gap-3 mb-3">
                        <img th:src="${order.goodsCoverImageUrl != null ? order.goodsCoverImageUrl : '/images/default-goods.svg'}"
                             class="list-thumb"
                             alt="商品封面">
                        <div>
                            <div class="fw-semibold" th:text="${order.goodsTitle}"></div>
                            <div class="small text-secondary" th:text="${order.statusLabel}"></div>
                        </div>
                    </div>

                    <div class="info-list detail-info-list">
                        <p><strong>卖家</strong><span th:text="${order.sellerName}"></span></p>
                        <p><strong>买家</strong><span th:text="${order.buyerName}"></span></p>
                        <p><strong>创建时间</strong><span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
                    </div>
                </div>
            </div>

            <div class="card panel-card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <h3 class="section-title mb-3">线下交易信息</h3>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="small text-secondary">见面时间</div>
                            <div th:text="${order.meetupTime != null ? #temporals.format(order.meetupTime, 'yyyy-MM-dd HH:mm') : '待协商'}"></div>
                        </div>
                        <div class="col-md-4">
                            <div class="small text-secondary">见面地点</div>
                            <div th:text="${order.meetupLocation != null and order.meetupLocation != '' ? order.meetupLocation : '待协商'}"></div>
                        </div>
                        <div class="col-md-4">
                            <div class="small text-secondary">备注说明</div>
                            <div th:text="${order.meetupNote != null and order.meetupNote != '' ? order.meetupNote : '无'}"></div>
                        </div>
                    </div>

                    <div class="small text-secondary mt-3">买家备注</div>
                    <div th:text="${order.buyerRemark != null and order.buyerRemark != '' ? order.buyerRemark : '未填写买家备注。'}"></div>

                    <form class="row g-3 mt-3" method="post" th:action="@{'/orders/' + ${order.orderId} + '/meetup'}">
                        <div class="col-md-4">
                            <label class="form-label small text-secondary">见面时间</label>
                            <input class="form-control" type="datetime-local" name="meetupTime"
                                   th:value="${order.meetupTime != null ? #temporals.format(order.meetupTime, 'yyyy-MM-dd''T''HH:mm') : ''}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-secondary">见面地点</label>
                            <input class="form-control" type="text" name="meetupLocation" maxlength="255" th:value="${order.meetupLocation}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-secondary">备注说明</label>
                            <input class="form-control" type="text" name="meetupNote" maxlength="255" th:value="${order.meetupNote}">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-sm btn-outline-primary" type="submit">更新交易信息</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card panel-card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="section-title mb-3">订单日志</h3>
                    <div class="empty-state p-3" th:if="${logs == null or logs.isEmpty()}">当前还没有订单日志。</div>
                    <div class="d-grid gap-3" th:if="${logs != null and !logs.isEmpty()}">
                        <div class="review-card" th:each="log : ${logs}">
                            <div class="d-flex justify-content-between align-items-center gap-2">
                                <div class="fw-semibold" th:text="${log.actionLabel}"></div>
                                <div class="small text-secondary" th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                            </div>
                            <div class="small text-secondary mt-1" th:text="${'操作人：' + log.operatorName}"></div>
                            <div class="small text-secondary" th:if="${log.fromStatusLabel != null and log.fromStatusLabel != '' and log.toStatusLabel != null and log.toStatusLabel != ''}"
                                 th:text="${'状态变更：' + log.fromStatusLabel + ' -> ' + log.toStatusLabel}"></div>
                            <div class="mt-2" th:if="${log.note != null and log.note != ''}" th:text="${'备注：' + log.note}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card panel-card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="price-text mb-3" th:text="${'¥' + order.amount}"></div>
                    <div class="d-grid gap-2">
                        <a class="btn btn-outline-secondary" th:href="@{'/goods/' + ${order.goodsId}}">查看商品</a>
                        <form th:if="${order.buyerSide and order.status == 'PENDING'}" method="post" th:action="@{'/orders/' + ${order.orderId} + '/cancel'}">
                            <button class="btn btn-outline-danger w-100" type="submit">取消订单</button>
                        </form>
                        <form th:if="${order.sellerSide and order.status == 'PENDING'}" method="post" th:action="@{'/orders/' + ${order.orderId} + '/seller-confirm'}">
                            <button class="btn btn-primary w-100" type="submit">确认交易</button>
                        </form>
                        <form th:if="${order.buyerSide and order.status == 'SELLER_CONFIRMED'}" method="post" th:action="@{'/orders/' + ${order.orderId} + '/buyer-complete'}">
                            <button class="btn btn-success w-100" type="submit">确认收货</button>
                        </form>
                        <a th:if="${order.buyerSide and order.status == 'COMPLETED' and !reviewed}" class="btn btn-outline-primary" th:href="@{'/orders/' + ${order.orderId} + '/review'}">去评价</a>
                        <a class="btn btn-outline-secondary" th:href="@{/orders}">返回订单列表</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
