<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 校园二手商城</title>
    <link rel="stylesheet" th:href="@{/css/vendor/bootswatch-flatly.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-bg auth-bg--minimal">
<div class="container py-5 auth-shell auth-shell--minimal">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="card auth-card auth-card--minimal border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="auth-minimal-head">
                        <div class="auth-kicker auth-kicker--minimal">校园二手商城</div>
                        <h1 class="auth-minimal-title">欢迎回来</h1>
                        <p class="auth-minimal-copy">使用学号或工号登录，继续你的校园交易。</p>
                    </div>

                    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form method="post" th:action="@{/login}" class="auth-form auth-form--minimal">
                        <div class="mb-3">
                            <label class="form-label">学号 / 工号</label>
                            <input type="text" class="form-control form-control-lg" name="username" required maxlength="32" placeholder="例如 2023123456">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control form-control-lg" name="password" required minlength="6" maxlength="64" placeholder="请输入登录密码">
                        </div>
                        <button class="btn btn-primary btn-lg w-100 auth-submit-btn" type="submit">登录</button>
                    </form>

                    <div class="auth-link-row auth-link-row--minimal mt-4">
                        <span>还没有账号？</span>
                        <a th:href="@{/register}">立即注册</a>
                    </div>
                    <div class="auth-admin-entry mt-3">
                        <a class="btn btn-link btn-sm" th:href="@{/}">返回首页</a>
                        <a class="btn btn-link btn-sm" th:href="@{/admin/login}">管理员入口</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
